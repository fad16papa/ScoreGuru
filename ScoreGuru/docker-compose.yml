services:
  postgres:
    image: postgres:16-alpine
    container_name: scoreguru-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scoreguru
      POSTGRES_USER: scoreguru
      POSTGRES_PASSWORD: scoreguru_dev_password
    ports:
      - "5432:5432"
    volumes:
      - scoreguru_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoreguru -d scoreguru"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scoreguru-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@creativorare.com
      PGADMIN_DEFAULT_PASSWORD: scoreguru_pgadmin_dev
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: scoreguru-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - scoreguru_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: scoreguru-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - scoreguru_redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  scoreguru_postgres_data:
  scoreguru_redis_data:
  scoreguru_redisinsight_data:
